<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mankind Global | NexPath AI</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #050816, #02030a);
      color: white;
    }

    canvas {
      display: block;
    }

    #overlay {
      position: absolute;
      top: 50%;
      left: 6%;
      transform: translateY(-50%);
      max-width: 520px;
      z-index: 10;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 16px;
      font-weight: normal;
      color: #00cfff;
      margin-top: 5px;
      margin-bottom: 20px;
    }

    p {
      opacity: 0.8;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 22px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .primary {
      background: linear-gradient(45deg, #ff7a18, #ffb347);
      color: white;
    }

    .secondary {
      background: transparent;
      border: 1px solid #00cfff;
      color: #00cfff;
      margin-left: 10px;
    }
  </style>
</head>

<body>

  <div id="overlay">
    <h1>MANKIND GLOBAL</h1>
    <h2>Powered by NexPath AI</h2>

    <p>
      A Global Humanitarian Intelligence System delivering aid, restoring dignity,
      and connecting humanity across borders through advanced technology.
    </p>

    <button class="btn primary">Request Help</button>
    <button class="btn secondary">Donate</button>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    let scene, camera, renderer, globe;

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 3;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Globe
      const geometry = new THREE.SphereGeometry(1, 64, 64);

      const material = new THREE.MeshBasicMaterial({
        color: 0x00cfff,
        wireframe: true
      });

      globe = new THREE.Mesh(geometry, material);
      scene.add(globe);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      globe.rotation.y += 0.002;

      renderer.render(scene, camera);
    }

    window.onload = init;

    // Resize fix
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
