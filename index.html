<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPath AI - Network Globe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #050816, #000);
}
#container { width: 100%; height: 100%; }
</style>
</head>

<body>
<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("container").appendChild(renderer.domElement);

// 🌍 DIGITAL GLOBE (NO TEXTURE)
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshBasicMaterial({
  color: 0x0a1a2f,
  wireframe: true,
  opacity: 0.3,
  transparent: true
});
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

// ✨ NODES
const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0xff6a00 });

for (let i = 0; i < 120; i++) {
  const lat = Math.random() * 180 - 90;
  const lng = Math.random() * 360 - 180;

  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;

  const x = Math.sin(phi) * Math.cos(theta);
  const y = Math.cos(phi);
  const z = Math.sin(phi) * Math.sin(theta);

  const node = new THREE.Mesh(
    new THREE.SphereGeometry(0.01, 8, 8),
    nodeMaterial
  );

  node.position.set(x, y, z);
  scene.add(node);
}

// ⚡ CONNECTION LINES
function connectPoints() {
  for (let i = 0; i < 50; i++) {
    const start = new THREE.Vector3().setFromSphericalCoords(1, Math.random()*Math.PI, Math.random()*Math.PI*2);
    const end = new THREE.Vector3().setFromSphericalCoords(1, Math.random()*Math.PI, Math.random()*Math.PI*2);

    const curve = new THREE.QuadraticBezierCurve3(
      start,
      start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(1.5),
      end
    );

    const points = curve.getPoints(50);
    const geometry = new THREE.BufferGeometry().setFromPoints(points);

    const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({
      color: 0x00e5ff,
      transparent: true,
      opacity: 0.6
    }));

    scene.add(line);
  }
}

connectPoints();

// 💡 LIGHT
const light = new THREE.PointLight(0xff6a00, 2);
light.position.set(2,2,2);
scene.add(light);

// 🔄 ANIMATE
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.0015;
  scene.rotation.y += 0.0005;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
