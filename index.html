<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mankind Global | NexPath AI</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #03060f, #000);
  color: white;
}

/* TEXT OVERLAY */
#overlay {
  position: absolute;
  top: 50%;
  left: 6%;
  transform: translateY(-50%);
  max-width: 520px;
  z-index: 10;
}

h1 {
  font-size: 52px;
  margin: 0;
  letter-spacing: 2px;
}

h2 {
  font-size: 16px;
  color: #00cfff;
  margin-bottom: 20px;
}

p {
  opacity: 0.85;
  line-height: 1.6;
}

/* BUTTONS */
.btn {
  margin-top: 20px;
  padding: 12px 22px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: linear-gradient(45deg, #ff7a18, #ffb347);
}

.secondary {
  background: transparent;
  border: 1px solid #00cfff;
  color: #00cfff;
  margin-left: 10px;
}

/* SYSTEM HUD */
#hud {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="overlay">
  <h1>MANKIND GLOBAL</h1>
  <h2>Powered by NexPath AI</h2>

  <p>
    A Global Humanitarian Intelligence System delivering aid, restoring dignity,
    and connecting humanity across borders through advanced technology.
  </p>

  <button class="btn primary">Request Help</button>
  <button class="btn secondary">Donate</button>
</div>

<div id="hud">
  <div>GLOBAL NETWORK: ACTIVE</div>
  <div>NODES ONLINE: 12,483</div>
  <div>AID REQUESTS: LIVE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, globe, nodes = [], rings = [];

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🌍 GLOBE (gradient feel)
  const geometry = new THREE.SphereGeometry(1, 64, 64);
  const material = new THREE.MeshStandardMaterial({
    color: 0x00cfff,
    emissive: 0x003344,
    roughness: 0.4,
    metalness: 0.7,
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // LIGHTING
  const light = new THREE.PointLight(0x00cfff, 2, 100);
  light.position.set(5, 3, 5);
  scene.add(light);

  // 🔵 NODES
  for (let i = 0; i < 200; i++) {
    const nodeGeo = new THREE.SphereGeometry(0.01, 8, 8);
    const nodeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const node = new THREE.Mesh(nodeGeo, nodeMat);

    const phi = Math.acos(-1 + (2 * i) / 200);
    const theta = Math.sqrt(200 * Math.PI) * phi;

    node.position.set(
      Math.cos(theta) * Math.sin(phi),
      Math.sin(theta) * Math.sin(phi),
      Math.cos(phi)
    );

    globe.add(node);
    nodes.push(node);
  }

  // 📡 RINGS
  for (let i = 0; i < 3; i++) {
    const ringGeo = new THREE.TorusGeometry(1.4 + i*0.2, 0.002, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00cfff });
    const ring = new THREE.Mesh(ringGeo, ringMat);

    ring.rotation.x = Math.random() * Math.PI;
    ring.rotation.y = Math.random() * Math.PI;

    scene.add(ring);
    rings.push(ring);
  }

  // ✨ STARFIELD
  const starsGeo = new THREE.BufferGeometry();
  const starsCount = 1000;
  const posArray = new Float32Array(starsCount * 3);

  for (let i = 0; i < starsCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 20;
  }

  starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

  const starsMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
  const stars = new THREE.Points(starsGeo, starsMat);

  scene.add(stars);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  globe.rotation.y += 0.002;

  nodes.forEach(node => {
    node.scale.setScalar(1 + Math.sin(Date.now() * 0.002) * 0.3);
  });

  rings.forEach(ring => {
    ring.rotation.z += 0.001;
  });

  renderer.render(scene, camera);
}

window.onload = init;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
