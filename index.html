<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mankind Global | NexPath AI</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#globe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding-top: 100px;
}

h1 {
  font-size: 3em;
  letter-spacing: 2px;
}

p {
  max-width: 700px;
  margin: auto;
  opacity: 0.8;
}

.button {
  margin-top: 20px;
  padding: 15px 30px;
  border: 1px solid white;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="globe"></canvas>

<div class="overlay">
  <h1>MANKIND GLOBAL</h1>
  <p>
    A global humanitarian intelligence system powered by NexPath AI.
    Delivering aid, restoring dignity, and connecting humanity worldwide.
  </p>

  <p>
    Founded by Tidimalo Konaite. Inspired by Paul, Apostle of Christ.
  </p>

  <div class="button">Request Help</div>
  <div class="button">Donate</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({canvas: document.getElementById("globe"), alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.SphereGeometry(2, 64, 64);
const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg');
const material = new THREE.MeshBasicMaterial({ map: texture });

const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

camera.position.z = 3;

function animate() {
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
